# Per-target rustflags. Native builds (bench, test) get
# `-C target-cpu=native` so LLVM can emit AVX / AVX2 / SIMD instructions
# specific to the host CPU - biggest single knob for numeric +
# iteration-heavy workloads like `compute_suggestions`.
#
# WASM builds (`wasm32-unknown-unknown`) are explicitly excluded
# because there's no "native" wasm CPU and applying target-cpu
# there is meaningless. WASM SIMD is opted into separately via
# `-C target-feature=+simd128` if/when we adopt it.

[target.'cfg(not(target_family = "wasm"))']
rustflags = ["-C", "target-cpu=native"]
