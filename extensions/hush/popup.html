<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hush</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #222;
      font-size: 13px;
      margin: 0;
      padding: 0;
      width: 420px;
    }
    header {
      padding: 12px 14px;
      border-bottom: 1px solid #eee;
    }
    header h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }
    header .match {
      margin-top: 4px;
      color: #666;
      font-size: 12px;
      word-break: break-all;
    }
    .unmatched {
      padding: 20px 14px;
      color: #666;
      text-align: center;
    }
    .sections {
      padding: 4px 0;
    }
    .section {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .section:last-child {
      border-bottom: none;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .section-name {
      font-weight: 500;
    }
    .count {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #eef1f6;
      color: #2b4a6f;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 12px;
      min-width: 20px;
      text-align: center;
    }
    .count.zero {
      background: #f0f0f0;
      color: #999;
    }
    details ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }
    details li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 3px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      color: #444;
    }
    details li .sel {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    details li .n {
      color: #666;
    }
    details summary {
      list-style: none;
    }
    details summary::-webkit-details-marker {
      display: none;
    }
    .no-sels {
      color: #999;
      font-style: italic;
      font-size: 11px;
      margin-top: 8px;
    }
    .evidence {
      margin-top: 8px;
      padding-left: 8px;
      border-left: 2px solid #e0e0e0;
    }
    .evidence-toggle {
      cursor: pointer;
      color: #2b7cff;
      font-size: 11px;
      margin-top: 4px;
      display: inline-block;
      user-select: none;
    }
    .evidence-toggle:hover {
      text-decoration: underline;
    }
    .evidence-list {
      list-style: none;
      padding: 0;
      margin: 6px 0 0;
    }
    .evidence-list li {
      padding: 2px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10px;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .evidence-list li .ts {
      color: #aaa;
      margin-right: 6px;
    }
    footer {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }
    button {
      flex: 1;
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Hush</h1>
    <div id="match" class="match">Loading...</div>
  </header>

  <div id="sections" class="sections" hidden>
    <details class="section" open>
      <summary class="section-head">
        <span class="section-name">Blocked (network)</span>
        <span id="block-count" class="count zero">0</span>
      </summary>
      <ul id="block-list"></ul>
      <div id="block-evidence" class="evidence" hidden></div>
    </details>
    <details class="section">
      <summary class="section-head">
        <span class="section-name">Removed (DOM)</span>
        <span id="remove-count" class="count zero">0</span>
      </summary>
      <ul id="remove-list"></ul>
      <div id="remove-evidence" class="evidence" hidden></div>
    </details>
    <details class="section">
      <summary class="section-head">
        <span class="section-name">Hidden (CSS)</span>
        <span id="hide-count" class="count zero">0</span>
      </summary>
      <ul id="hide-list"></ul>
    </details>
  </div>

  <div id="unmatched" class="unmatched" hidden>
    No config matched for this site.
  </div>

  <footer>
    <button id="options">Open options</button>
    <button id="reload">Reload tab</button>
    <button id="debug" title="Copy debug info to clipboard">Debug</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
