<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hush</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #222;
      font-size: 13px;
      margin: 0;
      padding: 0;
      width: 440px;
    }
    header {
      padding: 12px 14px;
      border-bottom: 1px solid #eee;
    }
    header h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }
    header .match {
      margin-top: 4px;
      color: #666;
      font-size: 12px;
      word-break: break-all;
    }
    .unmatched {
      padding: 12px 14px;
      color: #666;
      text-align: center;
      background: #fafafa;
      border-bottom: 1px solid #eee;
    }
    .unmatched button {
      margin-top: 8px;
    }
    .sections, .suggestions-block {
      padding: 4px 0;
    }
    .section, .sugg-section {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .section:last-child, .sugg-section:last-child {
      border-bottom: none;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .section-name {
      font-weight: 500;
    }
    .count {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #eef1f6;
      color: #2b4a6f;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 12px;
      min-width: 20px;
      text-align: center;
    }
    .count.zero {
      background: #f0f0f0;
      color: #999;
    }
    .count.sugg {
      background: #ffe8a8;
      color: #6b4a00;
    }
    details ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }
    details li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 3px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      color: #444;
    }
    details li .sel {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    details li .n {
      color: #666;
    }
    details summary {
      list-style: none;
    }
    details summary::-webkit-details-marker {
      display: none;
    }
    .no-sels {
      color: #999;
      font-style: italic;
      font-size: 11px;
      margin-top: 8px;
    }
    .evidence {
      margin-top: 8px;
      padding-left: 8px;
      border-left: 2px solid #e0e0e0;
    }
    .diagnostics {
      margin-top: 10px;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }
    .diagnostics-title {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }
    .rule-row {
      padding: 6px 0;
      border-bottom: 1px dotted #e8e8e8;
    }
    .rule-row:last-child { border-bottom: none; }
    .rule-pattern {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rule-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      margin-top: 3px;
    }
    .rule-fired {
      font-family: ui-monospace, monospace;
      color: #666;
    }
    .rule-status {
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
    }
    .rule-status.firing { background: #d7f3d7; color: #125a12; }
    .rule-status.no-traffic { background: #f0f0f0; color: #666; }
    .rule-status.pattern-broken { background: #fbdada; color: #8a0000; }
    .rule-hint {
      margin-top: 4px;
      padding: 6px 8px;
      background: #fff3cd;
      border-radius: 3px;
      font-size: 11px;
      color: #7a5d00;
    }
    .rule-hint .urls {
      margin-top: 4px;
      font-family: ui-monospace, monospace;
      font-size: 10px;
      color: #555;
    }
    .rule-hint .urls div {
      padding: 2px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .evidence-toggle {
      cursor: pointer;
      color: #2b7cff;
      font-size: 11px;
      margin-top: 4px;
      display: inline-block;
      user-select: none;
    }
    .evidence-toggle:hover {
      text-decoration: underline;
    }
    .evidence-list {
      list-style: none;
      padding: 0;
      margin: 6px 0 0;
    }
    .evidence-list li {
      padding: 2px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10px;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .evidence-list li .ts {
      color: #aaa;
      margin-right: 6px;
    }
    /* Suggestions specific */
    .sugg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #fff9e8;
      border-bottom: 1px solid #f0e4b8;
      font-weight: 500;
    }
    .sugg-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .sugg-list li {
      padding: 10px 14px;
      border-bottom: 1px solid #f6f6f6;
    }
    .sugg-list li:last-child {
      border-bottom: none;
    }
    .sugg-row-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .sugg-layer {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .sugg-layer.block  { background: #ffd6d6; color: #8a0000; }
    .sugg-layer.remove { background: #ffe4c4; color: #7a4000; }
    .sugg-layer.hide   { background: #dce7ff; color: #1a3a7a; }
    .sugg-iframe {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      background: #f0e8ff;
      color: #5a3a8a;
      font-size: 10px;
      font-family: ui-monospace, monospace;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: help;
    }
    .sugg-conf {
      font-size: 10px;
      color: #888;
      margin-left: auto;
      font-family: ui-monospace, monospace;
    }
    .sugg-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      color: #333;
      background: #f5f5f5;
      padding: 3px 6px;
      border-radius: 4px;
      margin: 2px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sugg-learn {
      font-size: 11px;
      line-height: 1.5;
      color: #555;
      background: #fafafa;
      border-left: 2px solid #c7d5e9;
      padding: 6px 9px;
      margin: 6px 0 2px;
      border-radius: 3px;
    }
    .sugg-reason {
      font-size: 11px;
      color: #666;
      margin: 3px 0;
    }
    .sugg-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .sugg-actions button {
      flex: 0 0 auto;
      padding: 4px 10px;
      font-size: 11px;
    }
    .sugg-actions .add {
      background: #2b7cff;
      color: white;
      border-color: #2b7cff;
    }
    .sugg-actions .add:hover { background: #1d66e0; }
    .sugg-actions .dismiss { color: #999; }
    .sugg-actions .allow {
      background: #fff;
      color: #2d8a3e;
      border-color: #b7d7bf;
    }
    .sugg-actions .allow:hover { background: #f0f9f2; border-color: #2d8a3e; }
    .sugg-actions .allow:disabled { color: #999; border-color: #ddd; cursor: default; }
    .sugg-evidence {
      margin-top: 6px;
    }
    .sugg-evidence-list {
      list-style: none;
      padding: 6px 8px;
      margin: 6px 0 0;
      background: #fafafa;
      border-left: 2px solid #e0e0e0;
      border-radius: 3px;
    }
    .sugg-evidence-list li {
      padding: 2px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sugg-disabled {
      padding: 14px;
      color: #666;
      text-align: center;
      font-size: 12px;
    }
    .sugg-disabled .hint {
      margin-bottom: 10px;
    }
    .sugg-disabled .btnrow {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .rescan-row {
      padding: 8px 14px;
      border-top: 1px solid #f6f6f6;
      background: #fafafa;
      display: flex;
      justify-content: flex-end;
    }
    footer {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }
    button {
      flex: 1;
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background: #f0f0f0; }
    .rescan-row button { flex: 0 0 auto; }
  </style>
</head>
<body>
  <header>
    <h1>Hush</h1>
    <!-- Matched-site header is rendered by the Leptos component tree
         at #rust-popup-root below. See src/ui_popup.rs. -->
  </header>
  <!-- Rust/Leptos component root. popup.js mounts it after WASM init. -->
  <div id="rust-popup-root"></div>

  <div id="unmatched" class="unmatched" hidden>
    No config matched for this site.
    <div><button id="create-site" style="display:none; flex:none; padding:6px 14px;">Create config for this site</button></div>
  </div>

  <!-- Suggestions list + detector enable/scan/rescan controls are
       rendered by the Leptos component tree at #rust-popup-root above. -->

  <!-- Blocked (network) section is rendered by the Leptos BlockedSection
       component at #rust-popup-root above (stage 4 iter 6). Remove + Hide
       sections still live here until the next iteration. -->
  <div id="sections" class="sections" hidden>
    <details class="section">
      <summary class="section-head">
        <span class="section-name">Removed (DOM)</span>
        <span id="remove-count" class="count zero">0</span>
      </summary>
      <ul id="remove-list"></ul>
      <div id="remove-evidence" class="evidence" hidden></div>
    </details>
    <details class="section">
      <summary class="section-head">
        <span class="section-name">Hidden (CSS)</span>
        <span id="hide-count" class="count zero">0</span>
      </summary>
      <ul id="hide-list"></ul>
    </details>
  </div>

  <footer>
    <button id="options">Open options</button>
    <button id="reload">Reload tab</button>
    <button id="debug" title="Copy debug info to clipboard">Debug</button>
  </footer>

  <!-- popup.js is a module so it can `import init, { mountPopup } from "./dist/pkg/hush.js"`. -->
  <script type="module" src="popup.js"></script>
</body>
</html>
